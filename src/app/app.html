<div class="min-h-screen h-full flex flex-col gap-1">
  <div class="px-5 pt-4">
    <app-header [data]="{ status: websocketStatus() }"></app-header>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
      <app-info-card
        (click)="togglePanel('map')"
        [isActive]="isMapOpened()"
        [data]="{
          type: InfoCardTypeEnum.localisation,
          value: this.localisationData()?.city ?? '',
          subValue: this.localisationData()?.principalSubdivision,
        }"
        [wsStatus]="websocketStatus()"
      ></app-info-card>
      <app-info-card
        (click)="togglePanel('temperature')"
        [data]="temperatureData()"
        [wsStatus]="websocketStatus()"
        [isActive]="isTemperatureDetailOpened()"
      ></app-info-card>
      <app-info-card
        (click)="togglePanel('pollutionA')"
        [data]="pollutionAData()"
        [wsStatus]="websocketStatus()"
        [isActive]="isPollutionADetailOpened()"
      ></app-info-card>
      <app-info-card
        (click)="togglePanel('pollutionB')"
        [data]="pollutionBData()"
        [wsStatus]="websocketStatus()"
        [isActive]="isPollutionBDetailOpened()"
      ></app-info-card>
    </div>
  </div>
  @if (isMapOpened()) {
    <div class="px-5 mt-4 lg:m-0 flex-1 flex items-center justify-center min-h-90">
      <div class="w-full h-full lg:w-[80%] lg:h-[80%] rounded-2xl overflow-hidden shadow-xl">
        <app-map [data]="localisationHistoryData()"></app-map>
      </div>
    </div>
  }
</div>
