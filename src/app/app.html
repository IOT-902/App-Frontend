<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
  <app-info-card
    [data]="{
      type: InfoCardTypeEnum.localisation,
      value: this.localisation()?.city ?? '',
      subValue: this.localisation()?.principalSubdivision,
    }"
  ></app-info-card>
  <app-info-card [data]="temperatureData()"></app-info-card>
  <app-info-card [data]="pollutionAData()"></app-info-card>
  <app-info-card [data]="pollutionBData()"></app-info-card>
</div>
