<div
  class="h-full border border-gray-300 rounded-xl p-5 shadow-sm hover:shadow-md flex flex-col gap-2 transition-all duration-300 hover:border-amber-100 relative"
>
  <div
    class="absolute top-0 right-0 w-24 h-24 bg-linear-to-br from-amber-300/30 to-transparent rounded-bl-full"
  ></div>
  <div class="flex justify-start items-center gap-4">
    <app-info-card-icon>
      {{ icon() }}
    </app-info-card-icon>

    <span class="text-gray-500 font-medium">
      {{ title() | uppercase }}
    </span>
  </div>

  @if (hasValue()) {
    <div class="font-bold text-2xl">
      {{ value() }}
    </div>
  } @else {
    <app-skeleton className="mt-2 h-5 w-48"></app-skeleton>
  }

  <div class="mt-2">
    @if (shouldShowChart()) {
      <apx-chart
        [series]="chartOptions().series!"
        [chart]="chartOptions().chart!"
        [stroke]="chartOptions().stroke!"
        [fill]="chartOptions().fill!"
        [colors]="chartOptions().colors!"
        [tooltip]="chartOptions().tooltip!"
      ></apx-chart>
    }

    @if (shouldShowChartLoader()) {
      <app-skeleton className="h-10 w-full"></app-skeleton>
    }

    @if (shouldShowSubValue()) {
      <span class="text-gray-500 font-medium">
        {{ data()?.subValue | uppercase }}
      </span>
    }

    @if (shouldShowSubValueLoader()) {
      <app-skeleton className="h-10 w-full"></app-skeleton>
    }
  </div>
</div>
